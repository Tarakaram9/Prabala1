testCase: Web automation – Successful login with valid credentials
tags:
  - bdd
  - gherkin
description: 'Generated from Gherkin: Successful login with valid credentials'
steps:
  - keyword: Web.Launch
    description: Given I launch the browser
  - keyword: NavigateTo
    params:
      url: https://example.com
    description: When I navigate to "https://example.com"
  - keyword: EnterText
    params:
      locator: '#username'
      value: '{{TEST_DATA.username}}'
  - keyword: EnterText
    params:
      locator: '#password'
      value: '{{TEST_DATA.password}}'
  - keyword: Click
    params:
      locator: '#login'
    description: And I click "#login"
  - keyword: AssertText
    params:
      locator: body
      expected: Welcome
    description: Then I should see "Welcome"
