testCase: Cognitet-feature1 – Successful login to Cognitest portal with valid credentials
tags:
  - bdd
  - gherkin
description: 'Generated from Gherkin: Successful login to Cognitest portal with valid credentials'
steps:
  - keyword: Web.Launch
    description: Given I launch the browser
  - keyword: NavigateTo
    params:
      url: https://cognitest-atbvhnhshhgnf5ed.eastus-01.azurewebsites.net/login
    description: When I navigate to "https://cognitest-atbvhnhshhgnf5ed.eastus-01.azurewebsites.net/login"
  - keyword: EnterText
    params:
      locator: '#username'
      value: '{{TEST_DATA.username}}'
  - keyword: EnterText
    params:
      locator: '#password'
      value: '{{TEST_DATA.password}}'
  - keyword: Click
    params:
      locator: '#loginButton'
    description: And I click "#loginButton"
  - keyword: AssertText
    params:
      locator: body
      expected: Welcome
    description: Then I should see "Welcome"
