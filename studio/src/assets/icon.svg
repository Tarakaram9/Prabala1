<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#a855f7" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#a855f7" stroke-opacity="0.08" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Outer ring arc (top-right) -->
  <path d="M 256 80 A 176 176 0 0 1 432 256" stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Inner ring arc (bottom-left) -->
  <path d="M 256 432 A 176 176 0 0 1 80 256" stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Bold P letter -->
  <g filter="url(#shadow)">
    <!-- P vertical stroke -->
    <rect x="148" y="148" width="48" height="216" rx="10" fill="url(#glow)"/>
    <!-- P bowl top -->
    <path d="M 196 148 Q 300 148 316 196 Q 332 244 296 278 Q 264 308 196 308 L 196 260 Q 244 260 264 244 Q 280 230 268 208 Q 256 188 196 196 Z" fill="url(#glow)"/>
  </g>

  <!-- Small play triangle (bottom right) — testing/automation hint -->
  <polygon points="340,340 400,372 340,404" fill="#a855f7" opacity="0.9"/>

  <!-- Dot accent top-left -->
  <circle cx="108" cy="108" r="10" fill="#6366f1" opacity="0.6"/>
  <!-- Dot accent bottom-right -->
  <circle cx="404" cy="404" r="7" fill="#a855f7" opacity="0.5"/>
</svg>
