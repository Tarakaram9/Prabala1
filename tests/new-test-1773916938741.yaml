testCase: Auti Assist
steps:
  - keyword: Web.Launch
    description: https://iot-ot-convergence.orangeglacier-4ff26b13.eastus.azurecontainerapps.io/tests
  - keyword: EnterText
    params:
      locator: '[placeholder="Enter your username"]'
      value: '{{TEST_DATA.Username}}'
  - keyword: EnterText
    params:
      locator: '[placeholder="Enter your password"]'
      value: '{{TEST_DATA.Password}}'
  - keyword: AssertVisible
    params:
      locator: '#dashboard'
  - keyword: AssertTitle
    params:
      title: Water HMI
  - keyword: AssertTitle
    params:
      title: Wastewater HMI
  - keyword: AssertTitle
    params:
      title: Results
  - keyword: AssertTitle
    params:
      title: Failover & HA
  - keyword: Web.Close
